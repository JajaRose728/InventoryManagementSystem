<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Login Page -->
  <div id="loginPage" class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
      <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">Inventory System</h1>
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="loginEmail" required class="mt-1 w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="loginPassword" required class="mt-1 w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">Login</button>
        <p class="text-center text-sm text-gray-500">Demo: admin@demo.com / admin123</p>
      </form>
    </div>
  </div>

  <!-- Dashboard Page -->
  <div id="dashboardPage" class="hidden">
    <nav class="bg-blue-600 text-white p-4 shadow-lg">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">📦 Inventory System</h1>
        <div class="flex gap-4 items-center">
          <button onclick="switchTab('products')" id="productsTab" class="px-4 py-2 bg-blue-700 rounded hover:bg-blue-800">Products</button>
          <button onclick="switchTab('categories')" id="categoriesTab" class="px-4 py-2 hover:bg-blue-500 rounded">Categories</button>
          <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded hover:bg-red-600">Logout</button>
        </div>
      </div>
    </nav>
    
    <!-- Products Tab -->
    <div id="productsTab" class="tab-content">
      <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">Products</h2>
          <button onclick="showProductForm()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">+ Add Product</button>
        </div>

        <!-- Search & Filter -->
        <div class="bg-white p-4 rounded-lg shadow mb-6 flex gap-4">
          <input type="text" id="searchInput" placeholder="Search products..." class="flex-1 px-3 py-2 border rounded">
          <select id="categoryFilter" class="px-3 py-2 border rounded">
            <option value="">All Categories</option>
          </select>
          <button onclick="loadProducts()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Search</button>
        </div>

        <!-- Products Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left">Name</th>
                <th class="px-4 py-3 text-left">SKU</th>
                <th class="px-4 py-3 text-left">Category</th>
                <th class="px-4 py-3 text-right">Price</th>
                <th class="px-4 py-3 text-right">Qty</th>
                <th class="px-4 py-3 text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="productsTable">
              <tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Categories Tab -->
    <div id="categoriesTabContent" class="tab-content hidden">
      <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">Categories</h2>
          <button onclick="showCategoryForm()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">+ Add Category</button>
        </div>

        <!-- Categories Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="categoriesGrid">
          <div class="bg-white p-4 rounded-lg shadow">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Form Modal -->
  <div id="productModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <h2 id="modalTitle" class="text-xl font-bold mb-4">Add Product</h2>
      <form id="productForm" class="space-y-4">
        <input type="hidden" id="productId">
        <div>
          <label class="block text-sm font-medium">Name</label>
          <input type="text" id="productName" required class="w-full px-3 py-2 border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium">SKU</label>
          <input type="text" id="productSku" required class="w-full px-3 py-2 border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium">Category</label>
          <select id="productCategory" required class="w-full px-3 py-2 border rounded"></select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium">Price</label>
            <input type="number" id="productPrice" step="0.01" required class="w-full px-3 py-2 border rounded">
          </div>
          <div>
            <label class="block text-sm font-medium">Quantity</label>
            <input type="number" id="productQuantity" required class="w-full px-3 py-2 border rounded">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium">Description</label>
          <textarea id="productDescription" rows="3" class="w-full px-3 py-2 border rounded"></textarea>
        </div>
        <div class="flex gap-4">
          <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Save</button>
          <button type="button" onclick="closeProductModal()" class="flex-1 bg-gray-300 py-2 rounded hover:bg-gray-400">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Category Form Modal -->
  <div id="categoryModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md">
      <h2 class="text-xl font-bold mb-4">Add Category</h2>
      <form id="categoryForm" class="space-y-4">
        <input type="hidden" id="categoryId">
        <div>
          <label class="block text-sm font-medium">Name</label>
          <input type="text" id="categoryName" required class="w-full px-3 py-2 border rounded">
        </div>
        <div>
          <label class="block text-sm font-medium">Description</label>
          <textarea id="categoryDescription" rows="3" class="w-full px-3 py-2 border rounded"></textarea>
        </div>
        <div class="flex gap-4">
          <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Save</button>
          <button type="button" onclick="closeCategoryModal()" class="flex-1 bg-gray-300 py-2 rounded hover:bg-gray-400">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    let token = localStorage.getItem('token');

    // Check auth on load
    if (token) showDashboard();

    // Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      
      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.success) {
          token = data.token;
          localStorage.setItem('token', token);
          showDashboard();
        } else {
          alert(data.error || 'Login failed');
        }
      } catch (err) {
        alert('Server not running. Start backend first.');
      }
    });

    // Product form submit
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('productId').value;
      const product = {
        name: document.getElementById('productName').value,
        sku: document.getElementById('productSku').value,
        categoryId: document.getElementById('productCategory').value,
        price: parseFloat(document.getElementById('productPrice').value),
        quantity: parseInt(document.getElementById('productQuantity').value),
        description: document.getElementById('productDescription').value,
        status: 'active'
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API_URL}/products/${id}` : `${API_URL}/products`;

      const res = await fetch(url, {
        method,
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(product)
      });

      const data = await res.json();
      if (data.success) {
        closeProductModal();
        loadProducts();
      } else {
        alert(data.error || 'Error saving product');
      }
    });

    function showDashboard() {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('dashboardPage').classList.remove('hidden');
      loadCategories();
      loadProducts();
      loadCategoryList();
    }

    function logout() {
      localStorage.removeItem('token');
      token = null;
      document.getElementById('dashboardPage').classList.add('hidden');
      document.getElementById('loginPage').classList.remove('hidden');
    }

    async function loadCategories() {
      try {
        const res = await fetch(`${API_URL}/categories`);
        const data = await res.json();
        
        if (data.success) {
          const options = data.data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
          document.getElementById('categoryFilter').innerHTML = '<option value="">All Categories</option>' + options;
          document.getElementById('productCategory').innerHTML = options;
        }
      } catch (err) {
        console.log('Using demo categories');
        const demoCats = '<option value="cat1">Electronics</option><option value="cat2">Office Supplies</option>';
        document.getElementById('categoryFilter').innerHTML = '<option value="">All Categories</option>' + demoCats;
        document.getElementById('productCategory').innerHTML = demoCats;
      }
    }

    async function loadProducts() {
      const search = document.getElementById('searchInput').value;
      const categoryId = document.getElementById('categoryFilter').value;
      
      let url = `${API_URL}/products?`;
      if (search) url += `search=${search}&`;
      if (categoryId) url += `categoryId=${categoryId}`;

      try {
        const res = await fetch(url, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        const data = await res.json();
        
        if (data.success) {
          displayProducts(data.data || []);
        } else {
          displayProducts(getDemoProducts());
        }
      } catch (err) {
        displayProducts(getDemoProducts());
      }
    }

    function displayProducts(products) {
      if (products.length === 0) {
        document.getElementById('productsTable').innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">No products found</td></tr>';
        return;
      }
      
      const rows = products.map(p => `
        <tr class="border-t hover:bg-gray-50">
          <td class="px-4 py-3">${p.name}</td>
          <td class="px-4 py-3 text-gray-600">${p.sku}</td>
          <td class="px-4 py-3">${p.categoryName || 'N/A'}</td>
          <td class="px-4 py-3 text-right">$${p.price}</td>
          <td class="px-4 py-3 text-right ${p.quantity < 10 ? 'text-red-600 font-bold' : ''}">${p.quantity}</td>
          <td class="px-4 py-3 text-center">
            <button onclick="editProduct('${p.id}')" class="text-blue-600 hover:underline mr-2">Edit</button>
            <button onclick="deleteProduct('${p.id}')" class="text-red-600 hover:underline">Delete</button>
          </td>
        </tr>
      `).join('');
      
      document.getElementById('productsTable').innerHTML = rows;
    }

    function getDemoProducts() {
      return [
        { id: '1', name: 'Laptop', sku: 'LAP-001', categoryName: 'Electronics', price: 999.99, quantity: 15 },
        { id: '2', name: 'Mouse', sku: 'MOU-001', categoryName: 'Electronics', price: 29.99, quantity: 50 },
        { id: '3', name: 'Notebook', sku: 'NOTE-001', categoryName: 'Office Supplies', price: 5.99, quantity: 5 }
      ];
    }

    function showProductForm() {
      document.getElementById('modalTitle').textContent = 'Add Product';
      document.getElementById('productId').value = '';
      document.getElementById('productForm').reset();
      document.getElementById('productModal').classList.remove('hidden');
    }

    function editProduct(id) {
      const products = getDemoProducts();
      const p = products.find(x => x.id === id);
      if (p) {
        document.getElementById('modalTitle').textContent = 'Edit Product';
        document.getElementById('productId').value = p.id;
        document.getElementById('productName').value = p.name;
        document.getElementById('productSku').value = p.sku;
        document.getElementById('productPrice').value = p.price;
        document.getElementById('productQuantity').value = p.quantity;
        document.getElementById('productModal').classList.remove('hidden');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Delete this product?')) return;
      
      try {
        await fetch(`${API_URL}/products/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
      } catch (err) {}
      
      loadProducts();
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.add('hidden');
    }

    // Tab switching - simplified
    function switchTab(tab) {
      // Hide all tab contents
      document.querySelectorAll('[class*="tab"]').forEach(el => {
        if (el.id && (el.id.includes('Tab') || el.id === 'categoriesTabContent')) {
          el.classList.add('hidden');
        }
      });
      
      // Remove active class from buttons
      document.getElementById('productsTab').classList.remove('bg-blue-700');
      document.getElementById('categoriesTab').classList.remove('bg-blue-700');
      
      if (tab === 'products') {
        // Show products
        const prodDiv = document.querySelector('[id="productsTab"]').nextElementSibling;
        if (prodDiv) prodDiv.classList.remove('hidden');
        document.getElementById('productsTab').classList.add('bg-blue-700');
      } else {
        // Show categories
        document.getElementById('categoriesTabContent').classList.remove('hidden');
        document.getElementById('categoriesTab').classList.add('bg-blue-700');
        loadCategoryList();
      }
    }

    // Category functions
    async function loadCategoryList() {
      try {
        const res = await fetch(`${API_URL}/categories`);
        const data = await res.json();
        if (data.success) {
          displayCategories(data.data || []);
        } else {
          displayCategories(getDemoCategories());
        }
      } catch (err) {
        displayCategories(getDemoCategories());
      }
    }

    function displayCategories(categories) {
      const grid = document.getElementById('categoriesGrid');
      const html = categories.map(c => `
        <div class="bg-white p-4 rounded-lg shadow hover:shadow-lg transition">
          <h3 class="font-bold text-lg">${c.name}</h3>
          <p class="text-gray-600 text-sm mb-4">${c.description}</p>
          <div class="flex gap-2">
            <button onclick="editCategory('${c.id}')" class="flex-1 bg-blue-500 text-white py-1 rounded hover:bg-blue-600">Edit</button>
            <button onclick="deleteCategory('${c.id}')" class="flex-1 bg-red-500 text-white py-1 rounded hover:bg-red-600">Delete</button>
          </div>
        </div>
      `).join('');
      grid.innerHTML = html || '<div class="col-span-full text-center text-gray-500">No categories</div>';
    }

    function getDemoCategories() {
      return [
        { id: 'cat1', name: 'Electronics', description: 'Electronic devices and gadgets' },
        { id: 'cat2', name: 'Office Supplies', description: 'Office materials and equipment' }
      ];
    }

    function showCategoryForm() {
      document.getElementById('categoryId').value = '';
      document.getElementById('categoryForm').reset();
      document.getElementById('categoryModal').classList.remove('hidden');
    }

    function editCategory(id) {
      const cats = getDemoCategories();
      const c = cats.find(x => x.id === id);
      if (c) {
        document.getElementById('categoryId').value = c.id;
        document.getElementById('categoryName').value = c.name;
        document.getElementById('categoryDescription').value = c.description;
        document.getElementById('categoryModal').classList.remove('hidden');
      }
    }

    async function deleteCategory(id) {
      if (!confirm('Delete this category?')) return;
      try {
        await fetch(`${API_URL}/categories/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
      } catch (err) {}
      loadCategoryList();
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.add('hidden');
    }

    // Category form submit
    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('categoryId').value;
      const category = {
        name: document.getElementById('categoryName').value,
        description: document.getElementById('categoryDescription').value
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API_URL}/categories/${id}` : `${API_URL}/categories`;

      try {
        const res = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(category)
        });
        const data = await res.json();
        if (data.success) {
          closeCategoryModal();
          loadCategoryList();
        } else {
          alert(data.error || 'Error saving category');
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });
  </script>
</body>
</html>
